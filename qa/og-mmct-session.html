<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OG: MMCT Session Slides</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #F4F1EA; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    color: #2F2F2F;
    -webkit-font-smoothing: antialiased;
  }
  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    background: #F4F1EA;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  /* Paper noise texture */
  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch' seed='3'/><feColorMatrix values='0 0 0 0 0.94  0 0 0 0 0.91  0 0 0 0 0.86  0 0 0 0.5 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    background-size: 320px 320px;
    mix-blend-mode: multiply;
    opacity: 0.42;
    pointer-events: none;
  }
  /* Diagonal gradient flourish — subtle warm bottom-right */
  .canvas::after {
    content: '';
    position: absolute;
    right: -120px;
    bottom: -160px;
    width: 720px;
    height: 720px;
    background: radial-gradient(circle at center, rgba(251,192,45,0.32), rgba(244,124,44,0.16) 38%, rgba(244,124,44,0) 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .canvas > * { position: relative; z-index: 1; }

  .top {
    display: flex;
    flex-direction: column;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    align-self: flex-start;
    background: rgba(244, 124, 44, 0.11);
    border: 1px solid rgba(244, 124, 44, 0.32);
    border-radius: 100px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #F47C2C;
    margin-bottom: 36px;
  }
  .eyebrow::before {
    content: '';
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #F47C2C;
  }
  h1 {
    font-size: 92px;
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -0.024em;
    color: #2F2F2F;
    margin-bottom: 28px;
    max-width: 940px;
  }
  h1 .accent {
    background: linear-gradient(to right, #F47C2C 0%, #FBC02D 90%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .sub {
    font-size: 28px;
    line-height: 1.4;
    color: #5A5A5A;
    max-width: 820px;
    font-weight: 400;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 24px;
  }
  .wordmark {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.01em;
    background: linear-gradient(to right, #F47C2C, #FBC02D);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 24px;
    background: linear-gradient(to right, #F47C2C, #FBC02D);
    color: #FFFFFF;
    font-size: 18px;
    font-weight: 700;
    border-radius: 100px;
    box-shadow: 0 6px 20px rgba(240, 90, 40, 0.28);
  }
  .badge svg { stroke: currentColor; }
</style>
</head>
<body>
  <div class="canvas">
    <div class="top">
      <div class="eyebrow">MMCT 2026 · Session Slides</div>
      <h1>What's Working in <span class="accent">Membership.</span></h1>
      <p class="sub">Every chart, framework, and takeaway from the talk — your way.</p>
    </div>
    <div class="footer">
      <span class="wordmark">PropFuel</span>
      <span class="badge">
        Grab the Slides
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </span>
    </div>
  </div>
</body>
</html>
