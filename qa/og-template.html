<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OG — Membership AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    font-family: 'DM Sans', -apple-system, system-ui, sans-serif;
    background: #F4F1EA;
    color: #1A1714;
    position: relative;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* Right gradient panel — steel-blue, diagonal soft edge */
  .panel-soft, .panel {
    position: absolute;
    top: 0;
    bottom: 0;
    pointer-events: none;
  }
  .panel-soft {
    /* pale halo wedge sitting just left of the main panel */
    left: 56%;
    right: 0;
    background: linear-gradient(105deg, transparent 0%, transparent 8%, rgba(122,168,201,0.18) 18%, rgba(122,168,201,0.10) 100%);
    clip-path: polygon(8% 0, 100% 0, 100% 100%, 0% 100%);
  }
  .panel {
    left: 62%;
    right: 0;
    background: linear-gradient(135deg, #7AA8C9 0%, #4A7FA5 35%, #35607E 70%, #1F3A51 100%);
    clip-path: polygon(7% 0, 100% 0, 100% 100%, 0% 100%);
    box-shadow: -2px 0 0 0 rgba(31,58,81,0.04);
  }

  /* Dot grid sitting on top of the gradient panel, lower-right area */
  .dots {
    position: absolute;
    right: 60px;
    bottom: 72px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 18px;
    z-index: 3;
  }
  .dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.40);
  }

  /* Foreground content */
  .frame {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo {
    width: 56px;
    height: 56px;
    display: block;
  }
  .brand {
    font-size: 24px;
    font-weight: 800;
    color: #1A1714;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  .body {
    margin-top: auto;
  }
  .pill {
    display: inline-block;
    padding: 9px 22px 8px;
    background: #F9A825;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 800;
    color: #1A1714;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .title {
    font-size: 92px;
    font-weight: 800;
    line-height: 1.02;
    letter-spacing: -0.030em;
    background: linear-gradient(135deg, #7AA8C9 0%, #4A7FA5 30%, #35607E 65%, #1F3A51 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    /* small drop-shadow to match the page's hero accent feel */
    filter: drop-shadow(0 2px 0 rgba(31,58,81,0.04));
  }
  .footer {
    font-size: 16px;
    font-weight: 500;
    color: #6E6E6E;
    margin-top: 28px;
    letter-spacing: 0;
  }
</style>
</head>
<body>
  <div class="panel-soft"></div>
  <div class="panel"></div>
  <div class="dots" id="dots"></div>

  <div class="frame">
    <div class="header">
      <img class="logo" src="https://cdn.prod.website-files.com/69ca88e6c52b04fb85f74a02/69ce6e2b73d61c0ea2f2d959_Favicon%20-%20Large.png" alt="PropFuel">
      <span class="brand">PropFuel</span>
    </div>

    <div class="body">
      <h1 class="title">Membership AI</h1>
      <div class="footer">propfuel.com</div>
    </div>
  </div>

  <script>
    // 6x6 dot grid (36 dots)
    var dots = document.getElementById('dots');
    for (var i = 0; i < 36; i++) {
      var s = document.createElement('span');
      dots.appendChild(s);
    }
  </script>
</body>
</html>
